<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form</title>
  </head>
  <body>

    <h1>form</h1>
    <form method="post" action="submit">
      <label for="user_name">User name: </label>
      <input type="text" id="user_name" />
      <br />

      <label for="user_email">Email: </label>
      <input type="email" id="user_email" />
      <br />

      <label for="user_password">Pasword:</label>
      <input type="password" id="user_password" />
      <br />

      <label for="entry_date">Username: </label>
      <input type="date" id="entry_date" />
      <br />

      <label for="entry_date_time">Date & Time: </label>
      <input type="datetime" id="entry_date_time" />
      <br />
      <label for="male">Male</label>
      <input type="radio" id="male" value="Male" name="gender" />
      <br>
      <label for="female">Female</label>
      <input type="radio" id="female" value="Female" name="gender" />
      <br>
      <select name="internet" id="internet">
        <option value="" disabled selected>Select Internet</option>
        <option value="worldlink">Worldlink</option>
        <option value="classic">Classic</option>
        <option value="subisu">Subisu</option>
        <option value="cg">CG</option>
      </select>
      <br>
      <label for="fav_internet">Favorite internet</label>
      <br>
      <label for="worldlink">Worldlink</label>
       <input type="checkbox" id="worldlink" name="isp" value="worldlink">
      <br>
      <label for="classictech">Classic Tech</label>
        <input type="checkbox" id="classictech" name="isp" value="classictech">
        <br>
      <label for="subisu">Subisu</label>
        <input type="checkbox" id="subisu" name="isp" value="subisu">
      <br><br><br>
      <label for="submit"></label>
        <input type="submit" value="Submit this form" id="submit">
    </form>
  </body>
</html>
